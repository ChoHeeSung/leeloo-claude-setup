# =============================================================================
# ITS DB 재설계 — 데이터 표준 사전
# Single Source of Truth: DDL 생성, 정합성 검증, RAG 파이프라인 공통 참조
# =============================================================================
# 작성일: 2026-04-02
# 근거: Step 2 data-relationship-analysis.md, 기존 DB 98개 테이블 전수 컬럼 분석
# 기존 고유 컬럼 약 350개 → 표준 컬럼 약 160개로 통합/정규화
# =============================================================================
version: "1.0"
created: "2026-04-02"

# =============================================================================
# 1. 도메인 사전 (Domain Dictionary)
# 동일 도메인은 어디서 사용되든 동일 타입/크기
# =============================================================================
domains:
  ID:
    type: VARCHAR2
    length: 20
    description: "엔티티 고유 식별자"

  STD_LINK_ID:
    type: VARCHAR2
    length: 10
    description: "표준 노드링크 식별자 (ITS_ERS 체계, 10자리 숫자)"

  CD:
    type: VARCHAR2
    length: 30
    description: "영문 코드값 (COM_CODE_ITEM 참조)"

  # LEGACY_CD 도메인 삭제 (피드백 3) — 레거시 추적 컬럼도 CD 도메인(VARCHAR2(30)) 사용

  NM:
    type: VARCHAR2
    length: 200
    description: "한글/영문 명칭"

  SHORT_NM:
    type: VARCHAR2
    length: 64
    description: "짧은 명칭 (지점명, 구간명 등)"

  DESC:
    type: VARCHAR2
    length: 500
    description: "상세 설명"

  LONG_DESC:
    type: VARCHAR2
    length: 4000
    description: "장문 상세 설명 (사고 처리 내역 등)"

  NUM:
    type: NUMBER
    precision: 10
    scale: 2
    description: "교통량/속도/점유율 등 수치"

  SMALL_NUM:
    type: NUMBER
    precision: 5
    scale: 2
    description: "소규모 수치 (점유율, 비율, PHF 등)"

  COUNT:
    type: NUMBER
    precision: 10
    scale: 0
    description: "건수/개수 (교통량, 차로수 등)"

  COORD:
    type: NUMBER
    precision: 12
    scale: 8
    description: "위도/경도 좌표 (WGS84)"

  MILG:
    type: NUMBER
    precision: 8
    scale: 3
    description: "이정 (km 단위, 소수점 3자리)"

  LEN:
    type: NUMBER
    precision: 8
    scale: 0
    description: "길이/거리 (m 단위)"

  SPD:
    type: NUMBER
    precision: 5
    scale: 2
    description: "속도 (km/h)"

  DTM:
    type: TIMESTAMP
    description: "일시 (수집/생성/수정)"

  DT:
    type: DATE
    description: "날짜 (설치일, 점검일 등)"

  YN:
    type: VARCHAR2
    length: 1
    description: "여부 ('Y'/'N')"
    check: "IN ('Y','N')"

  FLAG:
    type: NUMBER
    precision: 1
    scale: 0
    description: "플래그 (0/1)"

  SEQ:
    type: NUMBER
    precision: 10
    scale: 0
    description: "정렬 순서/시퀀스"

  IP:
    type: VARCHAR2
    length: 45
    description: "IP 주소 (IPv4/IPv6)"

  PORT:
    type: NUMBER
    precision: 5
    scale: 0
    description: "네트워크 포트"

  URL:
    type: VARCHAR2
    length: 500
    description: "URL (RTSP, HLS, WebRTC 등)"

  BLOB:
    type: BLOB
    description: "바이너리 대형 객체 (이미지 등)"

  JSON:
    type: CLOB
    description: "JSON 문자열 (VMS 현시 데이터 등)"

  PARAM:
    type: NUMBER
    precision: 7
    scale: 3
    description: "알고리즘 파라미터 (칼만필터 등)"

  PASSWORD:
    type: VARCHAR2
    length: 128
    description: "암호화된 비밀번호"

  TOKEN:
    type: VARCHAR2
    length: 500
    description: "인증 토큰"

  ADDRESS:
    type: VARCHAR2
    length: 200
    description: "주소 (도로명, 설치위치 등)"

  TIME_PART:
    type: VARCHAR2
    length: 10
    description: "시간 구성요소 — 통계/패턴 집계 차원, JOIN 키 아님"

# =============================================================================
# 2. 용어 사전 (Term Dictionary)
# 한글 용어 → 영문 약어 1:1 고정 매핑
# 기존 약어 → Semantic 명칭 전환
# =============================================================================
terms:
  # --- 식별자 ---
  장비식별자: EQUIP_ID
  구간식별자: LINK_ID
  표준링크식별자: STD_LINK_ID
  VDS구간식별자: VDS_LINK_ID
  지점식별자: SPOT_ID
  차로식별자: LANE_ID
  사고접수번호: INCIDENT_RECEIPT_NO
  터널식별자: TUNNEL_ID
  카메라식별자: CAMERA_ID
  운영자식별자: USER_ID
  GPS일련번호: GPS_SN
  루프검지기식별자: LOOP_ID
  현시식별자: PHASE_ID
  정책식별자: POLICY_ID
  코드그룹식별자: CODE_GROUP_ID
  코드값: CODE_VALUE
  메뉴식별자: MENU_ID
  시설물식별자: FACILITY_ID
  보고서식별자: REPORT_ID
  경보번호: ALARM_NUMBER
  유관기관식별자: AGENCY_ID

  # --- 명칭 ---
  장비명: EQUIP_NM
  구간명: LINK_NM
  지점명: SPOT_NM
  시작지점명: BEGIN_SPOT_NM
  종료지점명: END_SPOT_NM
  시작구간명: BEGIN_LINK_NM
  종료구간명: END_LINK_NM
  운영자명: OPERATOR_NM
  프리셋명: PRESET_NM
  코드그룹명: CODE_GROUP_NM
  코드값명: CODE_VALUE_NM
  도로명: ROAD_NM
  시작노드명: BEGIN_NODE_NM
  종료노드명: END_NODE_NM

  # --- 좌표/위치 ---
  위도: LATITUDE
  경도: LONGITUDE
  설치이정: INSTALL_MILEAGE
  설치이정설명: INSTALL_MILEAGE_DESC
  이정: MILEAGE
  시작지점이정: BEGIN_SPOT_MILEAGE
  종료지점이정: END_SPOT_MILEAGE

  # --- 일시 ---
  수집일시: COLLECT_DTM
  생성일시: CREATE_DTM
  수정일시: UPDATE_DTM
  설치일: INSTALL_DT
  접수일시: RECEIPT_DTM
  선언일시: DECLARE_DTM
  취소일시: CANCEL_DTM
  해지일시: TERMINATE_DTM
  작업시작일시: WORK_BEGIN_DTM
  작업종료일시: WORK_END_DTM
  발생일시: OCCUR_DTM
  점검일: CHECK_DT

  # --- 코드/분류 ---
  방향코드: DIRECTION_CD
  장비유형코드: EQUIP_TYPE_CD
  장비상세유형코드: EQUIP_DETAIL_TYPE_CD
  도로그룹코드: ROAD_GROUP_CD
  소유권코드: OWNERSHIP_CD
  프로토콜유형코드: PROTOCOL_TYPE_CD
  상황유형코드: INCIDENT_TYPE_CD
  상황상세유형코드: INCIDENT_DETAIL_TYPE_CD
  핵심상황유형코드: KEY_INCIDENT_TYPE_CD
  핵심상황상세유형코드: KEY_INCIDENT_DETAIL_TYPE_CD
  사고상태코드: INCIDENT_STATUS_CD
  사고등급코드: INCIDENT_GRADE_CD
  기상유형코드: WEATHER_TYPE_CD
  기상강도코드: WEATHER_INTENSITY_CD
  교통등급코드: TRAFFIC_GRADE_CD
  구간유형코드: LINK_TYPE_CD
  지점유형코드: SPOT_TYPE_CD
  운영자권한코드: OPERATOR_ROLE_CD
  운영자그룹코드: OPERATOR_GROUP_CD
  현시유형코드: PHASE_TYPE_CD
  통계구분코드: STATS_TYPE_CD
  패턴코드: PATTERN_CD
  패턴하위코드: PATTERN_SUB_CD
  구간설정유형코드: LINK_SETTING_TYPE_CD
  휘도모드코드: LUMINANCE_MODE_CD

  # --- 여부 ---
  사용여부: USE_YN
  접속여부: CONNECT_YN
  통계사용여부: STAT_USE_YN
  상태정보반영여부: STATUS_REFLECT_YN
  정체구간판정포함여부: CONGESTION_INCLUDE_YN
  돌발대응여부: INCIDENT_RESPONSE_YN

  # --- 교통 데이터 ---
  교통량: VOLUME
  속도: SPEED
  점유율: OCCUPANCY
  통과시간: PASSING_TIME
  정체길이: CONGESTION_LENGTH
  제한속도: RESTRICT_SPEED
  구간길이: LINK_LENGTH
  차로수: LANE_COUNT
  비율: RATIO
  첨두시간계수: PHF

  # --- 장비 속성 ---
  장비주소: EQUIPMENT_ADDRESS
  장비IP: EQUIP_IP
  장비포트: EQUIP_PORT
  제조사: MANUFACTURER
  모듈크기: MODULE_SIZE
  수평모듈수: HORIZONTAL_MODULE_COUNT
  수직모듈수: VERTICAL_MODULE_COUNT

  # --- 사고 관련 ---
  발생이정: INCIDENT_MILEAGE
  신고자: INFORMANT
  작업자: WORKER
  대응방법: RESPONSE_METHOD
  처리상세: PROCESS_DETAIL
  정체원인: CONGESTION_CAUSE
  사고전시거리: SHOW_DISTANCE

  # --- 기상 ---
  기온: TEMPERATURE
  강수량: RAINFALL
  풍속: WIND_SPEED
  풍향: WIND_DIRECTION
  습도: HUMIDITY
  하늘상태: SKY_STATUS

# =============================================================================
# 3. 컬럼 사전 (Column Dictionary)
# 표준 컬럼별 도메인 + 한글 코멘트 (전체 테이블에서 동일 적용)
#
# legacy_columns: 기존 DB 컬럼명 매핑 (마이그레이션 참조)
# =============================================================================
columns:

  # ===== 공통 식별자 =====
  EQUIP_ID:
    domain: ID
    comment: "장비 식별자 — COM_EQUIPMENT PK. 패턴: {nnnn}{TYPE}{nn}S"
    nullable: false
    legacy_columns: ["EQUIP_ID VARCHAR2(13)"]

  LINK_ID:
    domain: ID
    comment: "정보제공 구간 식별자 (ITS_PROC 체계). 패턴: 0000LV{n}{E/S}{nnnn}"
    nullable: false
    legacy_columns: ["LINK_ID VARCHAR2(13)"]

  STD_LINK_ID:
    domain: STD_LINK_ID
    comment: "표준 링크 식별자 (ITS_ERS 체계, LINK_ID와 별개). 10자리 숫자"
    nullable: false
    legacy_columns: ["LINK_ID VARCHAR2(10) -- ITS_ERS 스키마에서만"]

  VDS_LINK_ID:
    domain: ID
    comment: "VDS 검지 구간 식별자. 패턴: 0000LV{n}E{nnnn}"
    nullable: false
    legacy_columns: ["VDS_LINK_ID VARCHAR2(13)", "LINK_ID VARCHAR2(13) -- VDS_LINK_INFO에서"]

  SPOT_ID:
    domain: ID
    comment: "교통 지점 식별자. 패턴: 0000SP{E/S}{nnnn}"
    nullable: false
    legacy_columns: ["SPOT_ID VARCHAR2(13)"]

  LANE_ID:
    domain: ID
    comment: "차로 식별자"
    nullable: false
    legacy_columns: ["LANE_ID VARCHAR2(14)"]

  TUNNEL_ID:
    domain: ID
    comment: "터널 식별자"
    nullable: true
    legacy_columns: ["TUNNEL_ID VARCHAR2(13)"]

  CAMERA_ID:
    domain: ID
    comment: "CCTV 카메라 식별자 — COM_EQUIPMENT.EQUIP_ID 참조"
    nullable: true
    legacy_columns: ["CAMERA_ID VARCHAR2(13)"]

  USER_ID:
    domain: ID
    comment: "운영자 식별자"
    nullable: false
    legacy_columns: ["USER_ID VARCHAR2(10)"]

  INCIDENT_RECEIPT_NO:
    domain: SEQ
    comment: "사고 접수 번호 (시퀀스)"
    nullable: false
    legacy_columns: ["ACCDNT_RCEPT_NO NUMBER"]

  PHASE_ID:
    domain: SEQ
    comment: "VMS 현시 식별자"
    nullable: false
    legacy_columns: ["PHASE_ID NUMBER"]

  POLICY_ID:
    domain: SEQ
    comment: "VMS 정책 식별자"
    nullable: false
    legacy_columns: ["POLICY_ID NUMBER"]

  ALARM_NUMBER:
    domain: SEQ
    comment: "VIDS 경보 번호"
    nullable: false
    legacy_columns: ["ALARM_NUMBER NUMBER(8)"]

  FACILITY_ID:
    domain: ID
    comment: "센터 시설물 식별자"
    nullable: false
    legacy_columns: ["FACILITY_ID VARCHAR2(9)", "FACILITY_ID VARCHAR2(13)"]

  REPORT_ID:
    domain: SEQ
    comment: "보고서 식별자"
    nullable: false
    legacy_columns: ["RPT_ID NUMBER"]

  GPS_SN:
    domain: SEQ
    comment: "GPS 일련번호"
    nullable: false
    legacy_columns: ["GPS_SN NUMBER(4)"]

  LOOP_ID:
    domain: ID
    comment: "루프 검지기 식별자"
    nullable: false
    legacy_columns: ["LOOP_ID VARCHAR2(15)"]

  PRESET_ID:
    domain: SEQ
    comment: "CCTV 프리셋 번호"
    nullable: false
    legacy_columns: ["PRESET_ID NUMBER(3)"]

  # ===== 명칭 =====
  EQUIP_NM:
    domain: NM
    comment: "장비 명칭"
    legacy_columns: ["INSTL_MILG_DESC VARCHAR2(100) -- 장비 테이블에서 명칭 겸용"]

  LINK_NM:
    domain: NM
    comment: "구간 명칭"
    legacy_columns: ["LINK_NM VARCHAR2(128)", "LINK_NM VARCHAR2(100)"]
    type_conflict: "VARCHAR2(128) vs VARCHAR2(100) → 통일: NM(200)"

  SPOT_NM:
    domain: SHORT_NM
    comment: "지점 명칭"
    legacy_columns: ["SPOT_NM VARCHAR2(64)"]

  BEGIN_SPOT_NM:
    domain: SHORT_NM
    comment: "시작 지점 명칭"
    legacy_columns: ["BEGIN_SPOT_NM VARCHAR2(48)"]

  END_SPOT_NM:
    domain: SHORT_NM
    comment: "종료 지점 명칭"
    legacy_columns: ["END_SPOT_NM VARCHAR2(48)"]

  BEGIN_LINK_NM:
    domain: SHORT_NM
    comment: "시작 구간 명칭"
    legacy_columns: ["BEGIN_LINK_NM VARCHAR2(64)"]

  END_LINK_NM:
    domain: SHORT_NM
    comment: "종료 구간 명칭"
    legacy_columns: ["END_LINK_NM VARCHAR2(64)"]

  OPERATOR_NM:
    domain: NM
    comment: "운영자 명칭"
    legacy_columns: ["OPRTR_NM VARCHAR2(20)"]

  PRESET_NM:
    domain: NM
    comment: "CCTV 프리셋 명칭"
    legacy_columns: ["PRESET_NM VARCHAR2(128)", "PRESET_NM VARCHAR2(255)"]
    type_conflict: "VARCHAR2(128) vs VARCHAR2(255) → 통일: NM(200)"

  ROAD_NM:
    domain: SHORT_NM
    comment: "도로 명칭"
    legacy_columns: ["ROAD_NM VARCHAR2(64)"]

  BEGIN_NODE_NM:
    domain: SHORT_NM
    comment: "시작 노드 명칭 (표준 노드링크)"
    legacy_columns: ["BEGIN_NODE_NM VARCHAR2(64)"]

  END_NODE_NM:
    domain: SHORT_NM
    comment: "종료 노드 명칭 (표준 노드링크)"
    legacy_columns: ["END_NODE_NM VARCHAR2(64)"]

  CODE_GROUP_NM:
    domain: NM
    comment: "코드 분류 명칭"
    legacy_columns: ["CODE_CL_NM VARCHAR2(255)"]

  CODE_VALUE_NM:
    domain: NM
    comment: "코드값 명칭"
    legacy_columns: ["CODE_VALUE_NM VARCHAR2(255)"]

  # ===== 좌표/위치 =====
  LATITUDE:
    domain: COORD
    comment: "위도 (WGS84)"
    legacy_columns: ["LA NUMBER(14,8)"]

  LONGITUDE:
    domain: COORD
    comment: "경도 (WGS84)"
    legacy_columns: ["LONGD NUMBER(14,8)"]

  MIN_LATITUDE:
    domain: COORD
    comment: "최소 위도 (GPS 영역)"
    legacy_columns: ["MIN_LATITUDE NUMBER(14,8)"]

  MIN_LONGITUDE:
    domain: COORD
    comment: "최소 경도 (GPS 영역)"
    legacy_columns: ["MIN_LONGITUDE NUMBER(14,8)"]

  MAX_LATITUDE:
    domain: COORD
    comment: "최대 위도 (GPS 영역)"
    legacy_columns: ["MAX_LATITUDE NUMBER(14,8)"]

  MAX_LONGITUDE:
    domain: COORD
    comment: "최대 경도 (GPS 영역)"
    legacy_columns: ["MAX_LONGITUDE NUMBER(14,8)"]

  INSTALL_MILEAGE:
    domain: MILG
    comment: "장비 설치 이정 (km)"
    legacy_columns: ["INSTL_MILG NUMBER(5,3)", "INSTL_MILG NUMBER(6,3)"]
    type_conflict: "NUMBER(5,3) vs NUMBER(6,3) → 통일: MILG(8,3)"

  INSTALL_MILEAGE_DESC:
    domain: NM
    comment: "장비 설치 위치 설명"
    legacy_columns: ["INSTL_MILG_DESC VARCHAR2(100)"]

  MILEAGE:
    domain: MILG
    comment: "이정 (km)"
    legacy_columns: ["MILG NUMBER(5,2)", "MILEPOST NUMBER(6,3)", "MILEPOST NUMBER(6,0)", "MILEPOST NUMBER(22)"]
    type_conflict: "NUMBER(5,2)/NUMBER(6,0)/NUMBER(6,3)/NUMBER(22) → 통일: MILG(8,3)"

  BEGIN_SPOT_MILEAGE:
    domain: MILG
    comment: "시작 지점 이정 (km)"
    legacy_columns: ["BEGIN_SPOT_MILG NUMBER(6,0)"]

  END_SPOT_MILEAGE:
    domain: MILG
    comment: "종료 지점 이정 (km)"
    legacy_columns: ["END_SPOT_MILG NUMBER(6,0)"]

  INCIDENT_MILEAGE:
    domain: MILG
    comment: "사고 발생 이정 (km)"
    legacy_columns: ["OUTBRK_MILG NUMBER(6,3)"]

  INCIDENT_MILEAGE_END:
    domain: MILG
    comment: "사고 종료 이정 (km)"
    legacy_columns: ["OUTBRK_MILG_END NUMBER(6,3)"]

  # ===== 일시 =====
  COLLECT_DTM:
    domain: DTM
    comment: "수집 일시"
    nullable: false
    legacy_columns: ["COL_DTM DATE -- 48개 테이블에서 사용"]

  CREATE_DTM:
    domain: DTM
    comment: "생성 일시"
    legacy_columns: ["CREATE_DTM DATE"]

  UPDATE_DTM:
    domain: DTM
    comment: "수정 일시"
    legacy_columns: ["UPDT_DE DATE", "UPD_DTM DATE"]

  INSTALL_DT:
    domain: DT
    comment: "장비 설치일"
    legacy_columns: ["INSTALL_DT DATE -- 8개 장비 테이블"]

  RECEIPT_DTM:
    domain: DTM
    comment: "사고 접수 일시"
    legacy_columns: ["RCEPT_DT DATE"]

  DECLARE_DTM:
    domain: DTM
