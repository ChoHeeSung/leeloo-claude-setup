# =============================================================================
# 4. 타입 불일치 통일 규칙 (Type Conflict Resolution)
# 기존 DB에서 동일 컬럼명이 다른 타입을 가지는 26건 전수 통일 방침
# =============================================================================
type_conflicts:
  - column: BACKDOR_OPEN_YN
    old: ["VARCHAR2(1)", "VARCHAR2(7)"]
    new: "YN VARCHAR2(1)"
    rule: "모든 _YN 컬럼은 VARCHAR2(1) 통일"

  - column: CONGESTION_LENGTH
    old: ["NUMBER(10,0)", "NUMBER(6,3)"]
    new: "LEN NUMBER(8,0)"
    rule: "미터 단위 정수로 통일"

  - column: DOR_OPEN_YN
    old: ["VARCHAR2(1)", "VARCHAR2(7)"]
    new: "YN VARCHAR2(1)"
    rule: "_YN 통일"

  - column: EQUIP_ID
    old: ["VARCHAR2(13)", "VARCHAR2(14)"]
    new: "ID VARCHAR2(20)"
    rule: "ID 도메인 통일 (여유 확보)"

  - column: EQUIP_IP
    old: ["VARCHAR2(15)", "VARCHAR2(20)"]
    new: "IP VARCHAR2(45)"
    rule: "IPv6 대비"

  - column: FAC_TYPE
    old: ["NUMBER(22)", "VARCHAR2(7)"]
    new: "CD VARCHAR2(30)"
    rule: "코드값은 문자열로 통일"

  - column: FAN_EXECUT_YN
    old: ["VARCHAR2(1)", "VARCHAR2(7)"]
    new: "YN VARCHAR2(1)"
    rule: "_YN 통일"

  - column: FRONTDOR_OPEN_YN
    old: ["VARCHAR2(1)", "VARCHAR2(7)"]
    new: "YN VARCHAR2(1)"
    rule: "_YN 통일"

  - column: HEATER_EXECUT_YN
    old: ["VARCHAR2(1)", "VARCHAR2(7)"]
    new: "YN VARCHAR2(1)"
    rule: "_YN 통일"

  - column: INSTL_MILG
    old: ["NUMBER(5,3)", "NUMBER(6,3)"]
    new: "MILG NUMBER(8,3)"
    rule: "이정 도메인 통일"

  - column: LINK_ID
    old: ["VARCHAR2(10)", "VARCHAR2(13)", "VARCHAR2(100)"]
    new: "LINK_ID VARCHAR2(20), STD_LINK_ID VARCHAR2(10)"
    rule: "ITS_PROC 체계와 ITS_ERS 체계 컬럼명 분리"

  - column: LINK_LEN
    old: ["NUMBER(5,0)", "NUMBER(6,0)"]
    new: "LEN NUMBER(8,0)"
    rule: "길이 도메인 통일"

  - column: LINK_NM
    old: ["VARCHAR2(100)", "VARCHAR2(128)"]
    new: "NM VARCHAR2(200)"
    rule: "명칭 도메인 통일"

  - column: MILEPOST
    old: ["NUMBER(22)", "NUMBER(6,0)", "NUMBER(6,3)"]
    new: "MILG NUMBER(8,3)"
    rule: "이정 도메인 통일"

  - column: PHASE_ID
    old: ["NUMBER(22)", "NUMBER(38,0)"]
    new: "SEQ NUMBER(10,0)"
    rule: "시퀀스 도메인 통일"

  - column: PID
    old: ["NUMBER(22)", "VARCHAR2(7)"]
    new: "ID VARCHAR2(20)"
    rule: "OPR_ROLE_TM의 NUMBER → VARCHAR2 전환"

  - column: POLICY_ID
    old: ["NUMBER(22)", "NUMBER(4,0)"]
    new: "SEQ NUMBER(10,0)"
    rule: "시퀀스 도메인 통일"

  - column: PRESET_NM
    old: ["VARCHAR2(128)", "VARCHAR2(255)"]
    new: "NM VARCHAR2(200)"
    rule: "명칭 도메인 통일"

  - column: SEQ
    old: ["NUMBER(2,0)", "NUMBER(3,0)", "NUMBER(22)"]
    new: "SEQ NUMBER(10,0)"
    rule: "시퀀스 도메인 통일"

  - column: STTUS_INFO_REFLCT_AT
    old: ["VARCHAR2(1)", "VARCHAR2(7)"]
    new: "YN VARCHAR2(1)"
    rule: "_AT 접미어 → _YN으로 변경, VARCHAR2(1) 통일"

  - column: EXT_ORDER
    old: ["NUMBER(2,0)", "NUMBER(22)"]
    new: "SEQ NUMBER(10,0)"
    rule: "시퀀스 도메인 통일"

  - column: COMMENTS
    old: ["VARCHAR2(128)", "VARCHAR2(255)"]
    new: "DESC VARCHAR2(500)"
    rule: "설명 도메인 통일 (여유 확보)"

  - column: END_TIME
    old: ["VARCHAR2(8)", "VARCHAR2(100)"]
    new: "TIME_PART VARCHAR2(10)"
    rule: "시간 구성요소 도메인 통일"

  - column: FACILITY_ID
    old: ["VARCHAR2(9)", "VARCHAR2(13)"]
    new: "ID VARCHAR2(20)"
    rule: "ID 도메인 통일"

  - column: RESERVED
    old: ["VARCHAR2(20)", "VARCHAR2(100)"]
    new: "DESC VARCHAR2(500)"
    rule: "예약 필드는 설명 도메인으로 통일"

  - column: START_TIME
    old: ["VARCHAR2(8)", "VARCHAR2(100)"]
    new: "TIME_PART VARCHAR2(10)"
    rule: "시간 구성요소 도메인 통일"
